{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Create Account - IT-EMS</title>
    <style>
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #f8f9fa; 
        }

        .login-wrapper { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2rem; 
        }

        .login-form-container { 
            width: 100%; 
            max-width: 500px; 
            background: #fff; 
            border-radius: 16px; 
            padding: 2.5rem; 
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08); 
        }

        .login-title { 
            font-size: 1.75rem; 
            font-weight: 700; 
            color: #001f3f;
            margin-bottom: 0.5rem; 
        }

        .form-label { 
            font-weight: 600; 
            color: #495057;
            font-size: 0.9rem;
        }

        .btn-login { 
            width: 100%; 
            background: #001f3f; 
            color: #fff; 
            border: none; 
            padding: 0.9rem; 
            border-radius: 50px; 
            font-weight: 600; 
            transition: all 0.3s ease;
        }

        .btn-login:hover { 
            background: #003d5c; 
            transform: translateY(-2px);
        }

        .alert {
            font-size: 0.85rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-form-container">
            <h1 class="login-title">Create Your Account</h1>
            <p class="text-muted mb-4">Fill in the details below to sign up for IT-EMS.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email address (Optional)</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                </div>

                <form method="POST" action="">
                    {% csrf_token %}
                    <button type="submit" class="btn-login">Create Account</button>
                </form>
            </form>

            <div class="mt-4 text-center">
                <p class="mb-0 text-muted">Already have an account? 
                    <a href="{% url 'user_login' %}" class="text-decoration-none fw-bold" style="color: #001f3f;">Log in</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
