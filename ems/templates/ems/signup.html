<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <title>Create Account - IT-EMS</title>
    <style>
        body { 
            font-family: Inter, system-ui, sans-serif; background: #f8f9fa; 
        }

        .login-wrapper { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2rem; 
        }

        .login-form-container { 
            width: 100%; 
            max-width: 500px; 
            background: #fff; 
            border-radius: 16px; 
            padding: 2rem; 
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08); 
        }

        .login-title { 
            font-size: 1.75rem; 
            font-weight: 700; 
            margin-bottom: 1rem; 
        }

        .form-label { 
            font-weight: 600; 
        }

        .btn-login { 
            width: 100%; 
            background: #0d6efd; 
            color: #fff; 
            border: none; 
            padding: 0.9rem; 
            border-radius: 10px; 
            font-weight: 600; 
        }

        .btn-login:hover { 
            background: #0b5ed7; 
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-form-container">
            <h1 class="login-title">Create Your Account</h1>
            <p class="text-muted mb-4">Fill in the details below to sign up for an IT Equipment Monitoring account.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address (Optional)</label>
                    <input type="email" class="form-control" name="email" placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn-login">Create Account</button>
                </form>
            </form>
            <div class="mt-4 text-center">
                <a href="{% url 'user_login' %}" class="text-decoration-none">Already have an account? Log in</a>
            </div>
        </div>
    </div>
</body>
</html>
